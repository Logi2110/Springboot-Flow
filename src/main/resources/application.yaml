spring:
  application:
    name: flow

  # Caching Layer — uses simple in-memory ConcurrentMapCacheManager (no external server required)
  # Switch to redis/caffeine in production by changing spring.cache.type and adding the dependency
  cache:
    type: simple
    cache-names: users

# Enable detailed logging to see the execution flow
logging:
  level:
    com.logi.flow: INFO
    org.springframework.web: DEBUG
    org.springframework.aop: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Server configuration
server:
  port: 8080
  servlet:
    context-path: /

# Actuator endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always
